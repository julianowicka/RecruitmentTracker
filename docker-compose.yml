services:
  recruitment-tracker:
    container_name: recruitment-tracker
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - recruitment_tracker_data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: /app/data/sqlite.db
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      EMAIL_FROM: ${EMAIL_FROM:-Recruitment Tracker <no-reply@localhost>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      EMAIL_LOG_VERIFICATION_LINKS: ${EMAIL_LOG_VERIFICATION_LINKS:-false}
      EMAIL_VERIFICATION_EXPIRES_HOURS: ${EMAIL_VERIFICATION_EXPIRES_HOURS:-24}
    restart: unless-stopped
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health', (r) => { if (r.statusCode !== 200) throw new Error('unhealthy'); })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - web

volumes:
  recruitment_tracker_data:
    name: recruitment_tracker_data

networks:
  web:
    external: true


